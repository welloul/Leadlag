# ==========================================
# TokioParasite: Lead-Lag Arbitrage Bot Config
# ==========================================

[app]
log_level = "info"
perf_mode = true
cpu_pinning = true
tick_precision_ns = 5000000  # 5ms grid for correlation

[storage]
telemetry_path = "./data/telemetry/"
state_db_path = "./data/state_db"

# --- Exchange Venue Definitions ---

[venues.exchange_a]
name = "binance_futures"
api_key = "${BINANCE_API_KEY}"
api_secret = "${BINANCE_API_SECRET}"
ws_url = "wss://fstream.binance.com/ws"
rest_url = "https://fapi.binance.com"
max_rtt_ms = 50

[venues.exchange_b]
name = "hyperliquid"
api_key = "${HL_API_KEY}"
api_secret = "${HL_API_SECRET}"
ws_url = "wss://api.hyperliquid.xyz/ws"
rest_url = "https://api.hyperliquid.xyz"
max_rtt_ms = 100

# --- Strategy Parameters ---

[strategy]
active_strategy = "impulse_obi"

symbols = ["ZEC", "WLD", "FARTCOIN", "DOGE", "SUI", "BCH", "PUMP", "ADA"]

# Correlation-Hysteresis settings
window_size_ticks = 256
min_correlation_r = 0.85
hysteresis_buffer = 0.10
enable_obi = true
obi_weight = 0.3

# Impulse-OBI settings
impulse_threshold_bps = 5
lag_threshold_bps = 1.5
impulse_window_ms = 5
signal_timeout_ms = 150         # Combo window (was 10ms)
min_trade_size_filter = 0.001
spread_filter_bps = 10

# OBI divergence settings
obi_strong_threshold = 0.7
obi_neutral_threshold = 0.2
obi_depth = 5
obi_spike_threshold = 0.3

# Entry logic tightening (v0.1.3)
venue_freshness_ms = 400        # Both venues must have ticked within 400ms
entry_threshold_bps = 8         # Minimum edge to cover fees + slippage
cooldown_ms = 200               # Side-aware cooldown between trades
max_levels_consumed = 3         # Max price levels to sweep
obi_persist_ms = 200            # OBI must stay strong for 200ms
fill_conservatism = 0.5         # Only fill 50% of best level size

# --- Risk Management ---

[risk]
max_notional_usd = 5000.0
max_drawdown_daily = 200.0
max_slippage_bps = 8
signal_ttl_ms = 500             # Signal time-to-live (was 1500ms)
self_trade_prevention = true

# --- Simulation / Paper Trading ---

[simulation]
enabled = true
use_real_data = false           # Set to true for live market data feeds
latency_simulation_ms = 5
fee_tier_bps = 2.5
match_l2_depth = 10
