# ==========================================
# TokioParasite: Lead-Lag Arbitrage Bot Config
# ==========================================

[app]
log_level = "info"
perf_mode = true
cpu_pinning = true
tick_precision_ns = 5000000  # 5ms grid for correlation

[storage]
telemetry_path = "./data/telemetry/"
state_db_path = "./data/state_db"

# --- Exchange Venue Definitions ---
# Symmetric schema so EAL can treat either as Lead or Lag

[venues.exchange_a]
name = "binance_futures"
api_key = "${BINANCE_API_KEY}"
api_secret = "${BINANCE_API_SECRET}"
ws_url = "wss://fstream.binance.com/ws"
rest_url = "https://fapi.binance.com"
max_rtt_ms = 50

[venues.exchange_b]
name = "hyperliquid"
api_key = "${HL_API_KEY}"
api_secret = "${HL_API_SECRET}"
ws_url = "wss://api.hyperliquid.xyz/ws"
rest_url = "https://api.hyperliquid.xyz"
max_rtt_ms = 100

# --- Strategy Parameters ---

[strategy]
# Strategy selection: "correlation_hysteresis" or "impulse_obi"
active_strategy = "impulse_obi"

symbols = ["ZEC", "XMR", "LINK"]

# Correlation-Hysteresis settings (existing)
window_size_ticks = 256     # Must be power of 2 for ring buffer optimization
min_correlation_r = 0.85    # Threshold to trigger a signal
hysteresis_buffer = 0.10    # Requirement to flip Lead/Lag roles
enable_obi = true           # Order Book Imbalance fusion
obi_weight = 0.3            # Weight of Book Imbalance vs Trade Delta

# Impulse-OBI settings (new)
impulse_threshold_bps = 5        # 3-10 bps price move to detect impulse
lag_threshold_bps = 1.5          # 1-2 bps max move on other exchange
impulse_window_ms = 5            # 5ms lookback for price change
signal_timeout_ms = 10           # 5-10ms cancel timeout
min_trade_size_filter = 0.001    # Filter fake impulses from small trades
spread_filter_bps = 10           # Max spread to trade (avoid spread traps)

# OBI divergence settings
obi_strong_threshold = 0.7       # 0.6-0.8 strong imbalance
obi_neutral_threshold = 0.2      # Neutral zone
obi_depth = 5                    # 5-10 order book levels
obi_spike_threshold = 0.3        # Liquidity shift detection

# --- Risk Management (The "OMS" Layer) ---

[risk]
max_notional_usd = 5000.0   # Max size per single trade
max_drawdown_daily = 200.0  # Circuit breaker
max_slippage_bps = 8        # 0.08% max allowed slippage
signal_ttl_ms = 150         # Discard lead signal if not filled within this time
self_trade_prevention = true

# --- Simulation / Paper Trading ---

[simulation]
enabled = true
use_real_data = true        # Fetch real market data from Binance/Hyperliquid (no API keys needed)
latency_simulation_ms = 5   # Artificial RTT for paper trading
fee_tier_bps = 2.5          # Default taker fee for Hyperliquid
match_l2_depth = 10         # Match against top 10 levels of book
