# ==========================================
# TokioParasite: Lead-Lag Arbitrage Bot Config
# ==========================================

[app]
trading_mode = "paper"
target_exchange = "mexc"
log_level = "debug"
perf_mode = true
cpu_pinning = true
tick_precision_ns = 5000000  # 5ms grid for correlation

[storage]
telemetry_path = "./data/telemetry/"
state_db_path = "./data/state_db"

# --- Exchange Venue Definitions ---

[venues.exchange_a]
name = "binance_futures"
api_key = "${BINANCE_API_KEY}"
api_secret = "${BINANCE_API_SECRET}"
ws_url = "wss://fstream.binance.com/ws"
rest_url = "https://fapi.binance.com"
max_rtt_ms = 50

[venues.exchange_b]
name = "hyperliquid"
api_key = "${HL_API_KEY}"
api_secret = "${HL_API_SECRET}"
ws_url = "wss://api.hyperliquid.xyz/ws"
rest_url = "https://api.hyperliquid.xyz"
max_rtt_ms = 100

# --- Strategy Parameters ---

[strategy]
active_strategy = "impulse_obi"

symbols = ["PEPE", "WIF", "BONK", "TIA", "SEI", "INJ", "SUI", "ORDI", "STX"]

# Correlation-Hysteresis settings
window_size_ticks = 256
min_correlation_r = 0.85
hysteresis_buffer = 0.10
enable_obi = true
obi_weight = 0.3

# Impulse-OBI settings
impulse_threshold_bps = 25.0       # Catch the move earlier
lag_threshold_bps = 5.0          # Only enter if laggard is truly stuck
impulse_window_ms = 5            # Lookback window (unchanged)
signal_timeout_ms = 250          # Combo window
min_trade_size_filter = 0.001
spread_filter_bps = 0.0           # Disabled for Maker strat
# OBI divergence settings
obi_strong_threshold = 0.80      # Require extreme conviction on lead
obi_neutral_threshold = 0.15     # Tighter neutral band
obi_depth = 5
obi_spike_threshold = 0.20       # More sensitive
# Entry logic
venue_freshness_ms = 400
entry_threshold_bps = 40.0
cooldown_ms = 15
max_levels_consumed = 5          # Be more aggressive on the breakthrough
obi_persist_ms = 30              # CRITICAL: book pressure in crypto evaporates in 10-50ms
fill_conservatism = 0.5          # Only fill 50% of best level size
high_conviction_only = true
exit_timeout_ms = 600           # 600ms hold (tightly aligned with 625ms avg decay)
take_profit_bps = 5.0            

[strategy.symbol_timeouts]
default = 600
PEPE = 600
WIF = 600
BONK = 600
TIA = 600
SEI = 600
INJ = 600
SUI = 600
ORDI = 600
STX = 600

# --- Risk Management ---

[risk]
max_notional_usd = 22.0     # Max size per single trade (Tuned for safety)
max_position_usd = 50.0     # Max net position per symbol
leverage = 5.0              # Default isolated/cross leverage to apply
max_drawdown_daily = 200.0
max_slippage_bps = 12.0
signal_ttl_ms = 500             # Signal time-to-live
self_trade_prevention = true

# --- Simulation / Paper Trading ---

[simulation]
use_real_data = true           # Set to true for live market data feeds
latency_simulation_ms = 5
fee_tier_bps = 2.5
match_l2_depth = 10
